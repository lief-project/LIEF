[lief.build]
type             = "Release"
cache            = true
ninja            = true
parallel-jobs    = 0
stable-abi       = false
free-threaded    = true
cxx-compiler     = "clang++"
c-compiler       = "clang"
extra-cmake-opt  = [
  "-DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON",
  "-DPython_VERSION={python_version}",
  "-DCMAKE_COLOR_DIAGNOSTICS=ON",
  "-DCMAKE_CXX_COMPILER=clang++",
  "-DCMAKE_C_COMPILER=clang",
  "-DCMAKE_MODULE_PATH=/cmake/linux/",
]

compilation-flags = [
  "-O3",
  "-fuse-ld=lld",
  "-fdata-sections", "-ffunction-sections",
  "-Wno-unused-command-line-argument",
  "-Wno-unused-parameter",
  "-Wno-deprecated-declarations",
]

[lief.formats]
elf     = true
pe      = true
macho   = true
android = true
art     = true
vdex    = true
oat     = true
dex     = true

[lief.features]
json    = true
frozen  = true

[lief.logging]
enabled = true
debug   = true
