[package]
name        = "lief-ffigen"
edition     = "2021"
description = "Generate FFI bindings for LIEF"
version.workspace = true
authors.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
cc            = "=1.0"
autocxx-build = { git = "https://github.com/romainthomas/autocxx.git", branch = "0.27.0" }
miette        = { version = "=5.10", features = ["fancy"] }
clap          = { version = "=4.5.1", features = ["derive"] }
sha256        = "=1.6.0"
